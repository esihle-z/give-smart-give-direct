<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Give Smart. Give Direct.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Brand */
    --navy-900: #0A2240;
    --navy-800: #0E2A4D;
    --navy-700: #14365F;
    --navy-600: #1B4377;
    --green-500: #6DBE3F;
    --green-600: #5BA82F;
    --green-400: #84CC55;
    --green-100: #E8F5DC;
    --green-50: #F4FAEC;
    --ink: #0A1F3A;
    --ink-2: #485A75;
    --ink-3: #7E8EA3;
    --paper: #FBFBF8;
    --paper-2: #F4F5F1;
    --line: #E2E5DF;
    --white: #FFFFFF;

    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-xl: 28px;

    --shadow-sm: 0 1px 2px rgba(10,34,64,.06), 0 1px 1px rgba(10,34,64,.04);
    --shadow-md: 0 8px 22px -10px rgba(10,34,64,.18), 0 3px 8px -4px rgba(10,34,64,.08);
    --shadow-lg: 0 24px 60px -24px rgba(10,34,64,.35), 0 8px 18px -10px rgba(10,34,64,.18);

    --container: 1240px;

    --accent: var(--green-500);
    --accent-strong: var(--green-600);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-size: 16px;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; }
  img { display: block; max-width: 100%; }

  .container {
    width: 100%;
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  /* ============ NAV ============ */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(251,251,248,.85);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid rgba(10,34,64,.06);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    gap: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 44px;
    height: 44px;
    display: grid;
    place-items: center;
  }
  .brand-text {
    line-height: 1.05;
    display: flex;
    flex-direction: column;
  }
  .brand-text .t1 { font-weight: 800; font-size: 16px; color: var(--navy-900); letter-spacing: -0.01em; }
  .brand-text .t2 { font-weight: 800; font-size: 16px; color: var(--accent-strong); letter-spacing: -0.01em; }
  .brand-text .t3 { font-size: 11px; color: var(--ink-3); margin-top: 2px; font-weight: 500; }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .nav-links a {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink-2);
    transition: color .15s ease;
  }
  .nav-links a:hover { color: var(--navy-900); }
  .nav-links a.active { color: var(--navy-900); }

  .nav-cta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14.5px;
    letter-spacing: -0.005em;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease, color .15s ease;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--navy-900);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--navy-800); box-shadow: 0 8px 18px -8px rgba(10,34,64,.45); }
  .btn-green {
    background: var(--accent);
    color: var(--white);
  }
  .btn-green:hover { background: var(--accent-strong); box-shadow: 0 10px 22px -10px rgba(91,168,47,.55); }
  .btn-ghost {
    background: transparent;
    color: var(--navy-900);
    border: 1.5px solid rgba(10,34,64,.14);
  }
  .btn-ghost:hover { border-color: var(--navy-900); }
  .btn-lg { padding: 16px 26px; font-size: 15.5px; }

  .menu-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    border: 1.5px solid rgba(10,34,64,.14);
  }

  /* ============ HERO ============ */
  .hero {
    position: relative;
    background: var(--navy-900);
    color: var(--white);
    overflow: hidden;
    isolation: isolate;
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(80% 60% at 75% 20%, rgba(109,190,63,.18), transparent 55%),
      radial-gradient(60% 80% at 90% 80%, rgba(20,54,95,.7), transparent 60%);
    z-index: 0;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    gap: 48px;
    align-items: center;
    padding: 88px 0 120px;
    position: relative;
    z-index: 1;
  }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; padding: 56px 0 72px; gap: 36px; }
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    font-size: 12.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: rgba(255,255,255,.85);
  }
  .eyebrow .dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(109,190,63,.2);
  }

  .h1 {
    font-size: clamp(48px, 6.2vw, 80px);
    line-height: 1.02;
    font-weight: 800;
    letter-spacing: -0.025em;
    margin: 20px 0 0;
  }
  .h1 .accent { color: var(--accent); display: block; }
  .h1 .accent.with-rule {
    position: relative;
    padding-top: 12px;
  }
  .h1 .accent.with-rule::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 64px; height: 4px;
    background: var(--accent);
    border-radius: 2px;
  }

  .hero-sub {
    margin: 22px 0 0;
    font-size: 18px;
    line-height: 1.55;
    color: rgba(255,255,255,.78);
    max-width: 520px;
  }

  .trust-row {
    display: flex;
    gap: 28px;
    margin-top: 36px;
    flex-wrap: wrap;
  }
  .trust-pill {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .trust-pill .ic {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: rgba(109,190,63,.14);
    color: var(--accent);
    display: grid; place-items: center;
    border: 1px solid rgba(109,190,63,.35);
  }
  .trust-pill .lbl {
    font-size: 13.5px;
    font-weight: 600;
    line-height: 1.25;
    color: rgba(255,255,255,.9);
  }
  .trust-pill .lbl span { display: block; color: rgba(255,255,255,.55); font-weight: 500; font-size: 12px; }

  /* Hero three-beat steps */
  .hero-steps {
    list-style: none;
    margin: 28px 0 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    max-width: 560px;
  }
  @media (max-width: 540px) {
    .hero-steps { grid-template-columns: 1fr; gap: 10px; }
  }
  .hero-steps li {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 14px 14px 12px;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 14px;
    border-top: 2px solid var(--accent);
  }
  .hero-steps .s-n {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--accent);
    font-weight: 600;
  }
  .hero-steps .s-t {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,.92);
    line-height: 1.3;
  }

  /* Donation card */
  .donation-card {
    background: var(--white);
    color: var(--ink);
    border-radius: var(--radius-xl);
    padding: 22px;
    box-shadow: var(--shadow-lg);
    margin-top: 36px;
    max-width: 460px;
  }
  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--paper-2);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 14px;
  }
  .seg button {
    padding: 11px 16px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink-2);
    transition: all .2s ease;
  }
  .seg button.active {
    background: var(--navy-900);
    color: var(--white);
    box-shadow: 0 4px 10px -4px rgba(10,34,64,.4);
  }
  .amounts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .amount {
    padding: 14px 6px;
    border-radius: 12px;
    background: var(--white);
    border: 1.5px solid var(--line);
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    transition: all .15s ease;
  }
  .amount:hover { border-color: var(--navy-700); }
  .amount.active {
    background: var(--navy-900);
    color: var(--white);
    border-color: var(--navy-900);
  }
  .custom-amount {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 12px;
    padding: 0 14px;
  }
  .custom-amount span { color: var(--ink-2); font-weight: 700; font-size: 15px; }
  .custom-amount input {
    flex: 1;
    border: 0; outline: 0; background: transparent;
    padding: 12px 0;
    font: inherit;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
  }
  .give-btn {
    margin-top: 14px;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--white);
    border-radius: 14px;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.01em;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .15s ease, box-shadow .15s ease, transform .1s ease;
  }
  .give-btn:hover { background: var(--accent-strong); box-shadow: 0 14px 28px -14px rgba(91,168,47,.6); }
  .secure-row {
    margin-top: 12px;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    font-size: 12.5px;
    color: var(--ink-3);
    font-weight: 500;
  }
  .secure-row .b { display: inline-flex; align-items: center; gap: 6px; }

  /* Recipient card */
  .recipient-wrap {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    min-height: 560px;
  }
  @media (max-width: 980px) { .recipient-wrap { min-height: 460px; } }

  .portrait {
    position: relative;
    width: min(100%, 460px);
    aspect-ratio: 4/5;
    border-radius: 24px;
    overflow: hidden;
    background:
      radial-gradient(120% 80% at 70% 20%, #2C5440 0%, #16331E 50%, #0C1E18 100%);
    box-shadow: 0 30px 80px -30px rgba(0,0,0,.5);
  }
  .portrait::before {
    /* greenery hint */
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(40% 30% at 20% 30%, rgba(109,190,63,.25), transparent 70%),
      radial-gradient(30% 20% at 85% 15%, rgba(132,204,85,.18), transparent 70%);
  }
  .portrait .silhouette {
    /* simple monochrome silhouette placeholder */
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .portrait .silhouette svg { width: 75%; height: 90%; opacity: 0.92; }
  .portrait .label {
    position: absolute;
    top: 14px; left: 14px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    background: rgba(0,0,0,.25);
    padding: 6px 10px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
  }

  .recipient-card {
    position: absolute;
    right: -8px;
    bottom: 24px;
    width: 340px;
    background: var(--navy-900);
    color: var(--white);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 24px 48px -20px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
  }
  @media (max-width: 540px) {
    .recipient-card { right: 0; left: 0; margin: 0 auto; width: 92%; }
  }
  .recipient-card .head {
    padding: 12px 16px;
    background: linear-gradient(180deg, #14365F, #0E2A4D);
    font-weight: 700;
    font-size: 12.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .recipient-card .head .badge-ic {
    width: 22px; height: 22px;
    border-radius: 999px;
    background: var(--accent);
    display: grid; place-items: center;
  }
  .recipient-card .body {
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .recipient-card .name {
    font-weight: 800;
    font-size: 22px;
    color: var(--accent);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .recipient-card .sub {
    font-size: 13px;
    color: rgba(255,255,255,.7);
    margin-top: 2px;
    line-height: 1.35;
  }
  .recipient-card .foot {
    padding: 10px 16px 14px;
    border-top: 1px solid rgba(255,255,255,.06);
    display: flex; align-items: center; gap: 8px;
    font-size: 12.5px;
    color: rgba(255,255,255,.75);
  }
  .recipient-card .foot .hh { color: var(--accent); }

  /* QR */
  .qr {
    width: 110px; height: 110px;
    background: var(--white);
    padding: 8px;
    border-radius: 10px;
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    grid-template-rows: repeat(13, 1fr);
    gap: 0;
    border: 2px solid var(--accent);
  }
  .qr .cell { background: var(--navy-900); }
  .qr .cell.off { background: transparent; }

  /* ============ SECTION: STORY ============ */
  /* ============ LIVE FEED ============ */
  .live-strip {
    background: var(--white);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    overflow: hidden;
    position: relative;
  }
  .live-strip-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
  }
  .live-label {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--navy-900);
    color: var(--white);
    border-radius: 999px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    margin-left: 32px;
  }
  .live-label .pulse {
    width: 7px; height: 7px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(109,190,63,.7);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(109,190,63,.7); }
    70% { box-shadow: 0 0 0 8px rgba(109,190,63,0); }
    100% { box-shadow: 0 0 0 0 rgba(109,190,63,0); }
  }
  .live-track {
    display: flex;
    gap: 32px;
    flex: 1;
    overflow: hidden;
    mask-image: linear-gradient(90deg, transparent 0, #000 60px, #000 calc(100% - 60px), transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 60px, #000 calc(100% - 60px), transparent 100%);
  }
  .live-row {
    display: flex;
    gap: 32px;
    animation: scroll 50s linear infinite;
    flex-shrink: 0;
    white-space: nowrap;
  }
  @keyframes scroll {
    to { transform: translateX(-50%); }
  }
  .live-item {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--ink-2);
  }
  .live-item .who { font-weight: 700; color: var(--navy-900); }
  .live-item .amt { color: var(--accent-strong); font-weight: 700; font-family: "JetBrains Mono", monospace; }
  .live-item .ago { color: var(--ink-3); font-size: 12.5px; font-family: "JetBrains Mono", monospace; }
  .live-item .heart { color: var(--accent); }

  /* ============ RECIPIENTS GALLERY ============ */
  .recip-head {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    align-items: end;
    gap: 32px;
    margin-bottom: 48px;
  }
  @media (max-width: 760px) { .recip-head { grid-template-columns: 1fr; } }
  .recip-head .h2 { margin-top: 14px; }
  .recip-head .lede { margin-top: 0; }
  .recip-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
  }
  @media (max-width: 980px) { .recip-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .recip-grid { grid-template-columns: 1fr; } }
  .recip-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--line);
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    display: flex;
    flex-direction: column;
  }
  .recip-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: rgba(10,34,64,.12);
  }
  .recip-photo {
    aspect-ratio: 4/5;
    background: radial-gradient(110% 90% at 30% 25%, #2C5440 0%, #14331C 60%, #0B1D14 100%);
    position: relative;
    overflow: hidden;
  }
  .recip-photo .tag {
    position: absolute;
    top: 12px; left: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: rgba(10,34,64,.7);
    color: var(--white);
    border-radius: 999px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    backdrop-filter: blur(6px);
  }
  .recip-photo .tag .ck {
    width: 12px; height: 12px;
    border-radius: 999px;
    background: var(--accent);
    display: grid; place-items: center;
    color: var(--navy-900);
  }
  .recip-photo .qr-tag {
    position: absolute;
    bottom: 12px; right: 12px;
    width: 56px; height: 56px;
    padding: 4px;
    background: var(--white);
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(7, 1fr);
    gap: 0;
  }
  .recip-photo .qr-tag .c { background: var(--navy-900); }
  .recip-photo .qr-tag .c.off { background: transparent; }
  .recip-photo .silh { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: center; }
  .recip-photo .silh svg { width: 80%; height: 92%; }
  .recip-body {
    padding: 18px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .recip-body .name {
    font-size: 19px;
    font-weight: 800;
    color: var(--navy-900);
    letter-spacing: -0.01em;
    margin: 0;
  }
  .recip-body .meta {
    font-size: 13px;
    color: var(--ink-3);
    margin-top: 2px;
    font-family: "JetBrains Mono", monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .recip-body .need {
    margin: 14px 0 0;
    font-size: 14.5px;
    line-height: 1.5;
    color: var(--ink-2);
    flex: 1;
  }
  .recip-body .need strong { color: var(--navy-900); font-weight: 700; }
  .recip-progress {
    margin: 16px 0 12px;
  }
  .recip-progress .bar {
    height: 6px;
    border-radius: 999px;
    background: var(--paper-2);
    overflow: hidden;
  }
  .recip-progress .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .recip-progress .nums {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--ink-3);
  }
  .recip-progress .nums b { color: var(--navy-900); font-weight: 700; }
  .recip-give {
