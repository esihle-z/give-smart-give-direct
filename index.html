<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Give Smart. Give Direct. — A Nectar Road story</title>
<meta name="description" content="Scan a code. Support someone directly. Help restore dignity through essentials that matter." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─────────── Tokens ─────────── */
  :root {
    --navy-900: #0A2240;
    --navy-800: #102A4D;
    --navy-700: #1A3A60;
    --green-500: #6DBE3F;
    --green-600: #5BA82F;
    --green-100: #E8F5DC;
    --ink:     #0A1F3A;
    --ink-2:   #41546F;
    --ink-3:   #7E8EA3;
    --paper:   #FAF9F5;
    --paper-2: #F1F0EA;
    --line:    #E5E3DA;
    --white:   #FFFFFF;
    --container: 1180px;

    --accent: var(--green-500);
    --accent-strong: var(--green-600);

    --shadow-sm: 0 1px 2px rgba(10,34,64,.05);
    --shadow-md: 0 8px 28px -14px rgba(10,34,64,.22), 0 2px 6px -3px rgba(10,34,64,.06);
    --shadow-lg: 0 28px 60px -28px rgba(10,34,64,.35);

    --serif: "Fraunces", Georgia, "Times New Roman", serif;
    --sans:  "Inter", system-ui, -apple-system, sans-serif;
    --mono:  "JetBrains Mono", ui-monospace, monospace;
  }

  /* ─────────── Reset ─────────── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
    font-size: 16px;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; padding: 0; }
  img, svg { display: block; max-width: 100%; }
  ul, ol { margin: 0; padding: 0; list-style: none; }
  h1, h2, h3, h4, p { margin: 0; }

  .container {
    width: 100%;
    max-width: var(--container);
    margin: 0 auto;
    padding: 0 28px;
  }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  /* ─────────── Typography helpers ─────────── */
  .h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(48px, 6.4vw, 84px);
    line-height: 1.02;
    letter-spacing: -0.025em;
    font-variation-settings: "opsz" 120;
  }
  .h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(32px, 4vw, 52px);
    line-height: 1.06;
    letter-spacing: -0.02em;
    color: var(--navy-900);
    font-variation-settings: "opsz" 96;
  }
  .accent { color: var(--accent-strong); }
  .section.dark .h2 { color: var(--white); }
  .section.dark .accent { color: var(--accent); }

  .micro {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent-strong);
  }
  .micro::before {
    content: "";
    width: 24px;
    height: 1px;
    background: var(--accent);
  }
  .section.dark .micro { color: var(--accent); }
  .section.dark .micro::before { background: var(--accent); }

  .lede {
    font-size: 17.5px;
    line-height: 1.65;
    color: var(--ink-2);
    max-width: 520px;
  }
  .section.dark .lede { color: rgba(255,255,255,.75); }

  /* ─────────── Buttons ─────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 13px 22px;
    border-radius: 999px;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14.5px;
    letter-spacing: -0.005em;
    transition: transform .12s ease, background .15s ease, color .15s ease, border-color .15s ease, box-shadow .15s ease;
    white-space: nowrap;
    cursor: pointer;
  }
  .btn:active { transform: translateY(1px); }
  .btn-lg { padding: 15px 26px; font-size: 15.5px; }

  .btn-green        { background: var(--accent); color: #0A1F0A; }
  .btn-green:hover  { background: var(--accent-strong); color: var(--white); box-shadow: 0 10px 22px -10px rgba(91,168,47,.55); }

  .btn-navy         { background: var(--navy-900); color: var(--white); }
  .btn-navy:hover   { background: var(--navy-800); }

  .btn-ghost        { background: transparent; color: var(--navy-900); border: 1px solid rgba(10,34,64,.18); }
  .btn-ghost:hover  { border-color: var(--navy-900); }

  .btn-ghost-light  { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,.3); }
  .btn-ghost-light:hover { border-color: var(--white); background: rgba(255,255,255,.06); }

  /* ─────────── Nav ─────────── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    transition: background .25s ease, border-color .25s ease, backdrop-filter .25s ease;
  }
  .nav.is-top {
    background: transparent;
    border-bottom: 1px solid transparent;
  }
  .nav.is-top .brand-text .t1,
  .nav.is-top .nav-links a { color: rgba(255,255,255,.92); }
  .nav.is-top .brand-text .t2 { color: var(--accent); }
  .nav.is-scrolled {
    background: rgba(250,249,245,.85);
    border-bottom: 1px solid rgba(10,34,64,.06);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    gap: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-text {
    line-height: 1.05;
    display: flex;
    flex-direction: column;
    white-space: nowrap;
  }
  .brand-text .t1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--navy-900);
    white-space: nowrap;
  }
  .brand-text .t2 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--accent-strong);
    font-style: italic;
    white-space: nowrap;
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 30px;
  }
  .nav-links a {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-2);
    transition: color .15s ease;
  }
  .nav-links a:hover { color: var(--navy-900); }
  .nav.is-top .nav-links a:hover { color: var(--white); }
  @media (max-width: 760px) { .nav-links { display: none; } }

  /* ─────────── Hero ─────────── */
  .hero {
    position: relative;
    min-height: 92vh;
    min-height: 92svh;
    background: #0A2240;
    color: var(--white);
    overflow: hidden;
    isolation: isolate;
    display: flex;
    align-items: flex-end;
    padding: 120px 0 80px;
  }
  .hero-photo {
    position: absolute;
    inset: 0 0 0 38%;
    z-index: 0;
  }
  .hero-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 10%;
    filter: contrast(1.02) saturate(.92);
  }
  .hero-photo-grade {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(95deg, rgba(10,34,64,.85) 0%, rgba(10,34,64,.55) 45%, rgba(10,34,64,.18) 75%, rgba(10,34,64,.4) 100%),
      linear-gradient(180deg, rgba(10,34,64,.3) 0%, transparent 30%, rgba(10,34,64,.5) 100%);
  }
  .hero-inner {
    position: relative;
    z-index: 1;
    width: 100%;
  }
  .hero-copy { max-width: 640px; }
  .kicker {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 26px;
    padding-left: 32px;
    position: relative;
  }
  .kicker::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    width: 22px;
    height: 1px;
    background: var(--accent);
  }
  .hero .h1 {
    color: var(--white);
  }
  .hero .h1 .accent {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .hero-sub {
    margin: 26px 0 0;
    font-size: 19px;
    line-height: 1.55;
    color: rgba(255,255,255,.82);
    max-width: 520px;
  }
  .hero-actions {
    display: flex;
    gap: 14px;
    margin-top: 36px;
    flex-wrap: wrap;
  }
  .hero-meta {
    margin-top: 44px;
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,.7);
    white-space: nowrap;
  }
  .hero-meta > span { white-space: nowrap; }
  .hero-meta .dot-sep {
    width: 3px; height: 3px; border-radius: 999px; background: rgba(255,255,255,.4);
  }
  .hero-bar {
    margin-top: 10px;
    width: min(420px, 100%);
    height: 3px;
    background: rgba(255,255,255,.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .hero-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }
  .hero-scroll {
    position: absolute;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    width: 24px;
    height: 38px;
    border: 1px solid rgba(255,255,255,.35);
    border-radius: 14px;
    display: grid;
    place-items: center;
    opacity: .55;
    transition: opacity .2s ease;
  }
  .hero-scroll:hover { opacity: 1; }
  .hero-scroll span {
    width: 2px;
    height: 6px;
    border-radius: 2px;
    background: var(--white);
    animation: scroll-dot 1.8s cubic-bezier(.6,0,.4,1) infinite;
  }
  .hero-scroll span:nth-child(2) { display: none; }
  @keyframes scroll-dot {
    0%   { transform: translateY(-6px); opacity: 0; }
    30%  { opacity: 1; }
    100% { transform: translateY(6px); opacity: 0; }
  }

  /* ─────────── Sections ─────────── */
  .section {
    padding: 120px 0;
  }
  @media (max-width: 720px) { .section { padding: 72px 0; } }
  .section.tint { background: var(--paper-2); }
  .section.dark { background: var(--navy-900); color: var(--white); }

  /* ─────────── Story ─────────── */
  .story-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
  }
  @media (max-width: 880px) { .story-grid { grid-template-columns: 1fr; gap: 44px; } }

  .story-text .h2 { margin-top: 18px; }
  .story-text .lede { margin-top: 22px; }
  .story-text .lede + .lede { margin-top: 16px; }

  .smallact {
    margin-top: 32px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--navy-900);
    font-weight: 600;
    font-size: 15px;
    border-bottom: 1px solid var(--navy-900);
    padding-bottom: 4px;
  }
  .smallact:hover { color: var(--accent-strong); border-color: var(--accent-strong); }

  /* The Verified Recipient Card — shown inline in story, not floating */
  .story-card-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .recipient-card {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 18px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    transform: rotate(-1.2deg);
    transition: transform .3s cubic-bezier(.2,.9,.3,1);
  }
  .recipient-card:hover { transform: rotate(0); }

  .rc-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--navy-900);
    color: var(--white);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .rc-badge {
    width: 18px; height: 18px;
    border-radius: 999px;
    background: var(--accent);
    color: var(--navy-900);
    display: grid; place-items: center;
  }
  .rc-id {
    margin-left: auto;
    color: rgba(255,255,255,.55);
    font-size: 10.5px;
  }
  .rc-body {
    padding: 22px 20px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: start;
  }
  .rc-meta { min-width: 0; }
  .rc-name {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: -0.015em;
    color: var(--navy-900);
    line-height: 1.1;
  }
  .rc-loc {
    margin-top: 4px;
    color: var(--ink-3);
    font-size: 13px;
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }
  .rc-needs {
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-2);
  }
  .rc-needs span {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 4px;
  }
  .rc-foot {
    padding: 12px 20px 16px;
    border-top: 1px dashed var(--line);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-3);
    white-space: nowrap;
  }
  .rc-foot .rc-brand { color: var(--accent-strong); }

  .card-caption {
    font-size: 13px;
    color: var(--ink-3);
    font-style: italic;
    margin-top: 8px;
  }

  /* QR */
  .qr {
    background: var(--white);
    padding: 6px;
    border-radius: 8px;
    border: 1px solid var(--navy-900);
    flex-shrink: 0;
    width: 104px;
    height: 104px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr img { display: block; width: 100%; height: 100%; border-radius: 4px; }

  /* ─────────── How it works ─────────── */
  .how-head {
    margin-bottom: 56px;
    max-width: 640px;
  }
  .how-head .h2 { margin-top: 18px; }
  .how-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 36px;
    counter-reset: step;
  }
  @media (max-width: 880px) { .how-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; } }
  @media (max-width: 480px) { .how-grid { grid-template-columns: 1fr; } }

  .step {
    padding-top: 28px;
    border-top: 1px solid var(--ink);
    position: relative;
  }
  .step-n {
    display: block;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--accent-strong);
    margin-bottom: 16px;
  }
  .step h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -0.015em;
    color: var(--navy-900);
    margin-bottom: 10px;
    line-height: 1.1;
  }
  .step p {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-2);
  }

  /* ─────────── Give section ─────────── */
  .give-section { background: var(--navy-900); color: var(--white); }
  .give-section .h2 { color: var(--white); }
  .give-section .lede { color: rgba(255,255,255,.78); }
  .give-section .micro { color: var(--accent); }
  .give-section .micro::before { background: var(--accent); }

  .give-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  @media (max-width: 880px) { .give-grid { grid-template-columns: 1fr; gap: 44px; } }
  .give-list {
    margin: 32px 0 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .give-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,.85);
    font-size: 14.5px;
  }
  .give-list svg { color: var(--accent); flex-shrink: 0; }

  /* ─────────── Donation card ─────────── */
  .donation-card {
    background: var(--white);
    color: var(--ink);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 460px;
    margin-left: auto;
  }
  .don-head {
    margin-bottom: 18px;
  }
  .don-eyebrow {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 12px;
  }
  .seg {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--paper-2);
    border-radius: 999px;
    padding: 4px;
  }
  .seg button {
    padding: 10px 16px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--ink-2);
    transition: all .2s ease;
  }
  .seg button.active {
    background: var(--navy-900);
    color: var(--white);
  }
  .amounts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .amount {
    padding: 13px 6px;
    border-radius: 12px;
    background: var(--white);
    border: 1px solid var(--line);
    font-weight: 600;
    font-size: 14.5px;
    color: var(--ink);
    transition: all .12s ease;
  }
  .amount:hover { border-color: var(--navy-700); }
  .amount.active {
    background: var(--navy-900);
    color: var(--white);
    border-color: var(--navy-900);
  }
  .custom-amount {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 0 14px;
  }
  .custom-amount span {
    color: var(--ink-2);
    font-weight: 600;
    font-size: 15px;
  }
  .custom-amount input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    padding: 12px 0;
    font: inherit;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
  }
  .give-btn {
    margin-top: 16px;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #0A1F0A;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15.5px;
    letter-spacing: -0.005em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .15s ease, color .15s ease, box-shadow .15s ease;
  }
  .give-btn:hover {
    background: var(--accent-strong);
    color: var(--white);
    box-shadow: 0 14px 28px -14px rgba(91,168,47,.6);
  }
  .give-btn:disabled { opacity: .6; cursor: wait; }
  .secure-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 11.5px;
    color: var(--ink-3);
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }
  .secure-row .b {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .secure-row .dvd { opacity: .5; }

  /* ─────────── Impact pillars ─────────── */
  .impact-head {
    margin-bottom: 60px;
    max-width: 640px;
  }
  .impact-head .h2 { margin-top: 18px; }
  .impact-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
  }
  @media (max-width: 880px) { .impact-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; } }
  @media (max-width: 480px) { .impact-grid { grid-template-columns: 1fr; } }
  .pillar {
    border-top: 1px solid rgba(255,255,255,.15);
    padding-top: 24px;
  }
  .pillar-ic {
    width: 36px; height: 36px;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .pillar h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.015em;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.15;
  }
  .pillar p {
    font-size: 14.5px;
    line-height: 1.55;
    color: rgba(255,255,255,.7);
  }

  /* ─────────── CTA band ─────────── */
  .cta-band {
    background: var(--paper);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 80px 0;
  }
  .cta-inner {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: center;
  }
  @media (max-width: 760px) {
    .cta-inner { grid-template-columns: 1fr; }
  }
  .cta-band h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(28px, 3.4vw, 40px);
    letter-spacing: -0.02em;
    color: var(--navy-900);
    line-height: 1.1;
  }
  .cta-band p {
    margin-top: 12px;
    color: var(--ink-2);
    font-size: 16px;
    max-width: 560px;
  }

  /* ─────────── Footer ─────────── */
  footer {
    background: var(--navy-900);
    color: rgba(255,255,255,.7);
    padding: 64px 0 32px;
  }
  .foot-top {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    gap: 36px;
    padding-bottom: 36px;
    border-bottom: 1px solid rgba(255,255,255,.1);
  }
  @media (max-width: 760px) { .foot-top { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .foot-top { grid-template-columns: 1fr; } }

  .foot-brand { max-width: 280px; }
  .foot-wordmark {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: -0.01em;
  }
  .foot-wordmark .accent { color: var(--accent); font-style: italic; }
  .foot-tag {
    margin-top: 14px;
    font-size: 14px;
    line-height: 1.55;
    color: rgba(255,255,255,.55);
  }
  .foot-col h4 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--white);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .foot-col a {
    display: block;
    color: rgba(255,255,255,.6);
    font-size: 14px;
    padding: 5px 0;
    transition: color .15s ease;
  }
  .foot-col a:hover { color: var(--accent); }
  .foot-bottom {
    padding-top: 22px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    font-size: 12.5px;
    color: rgba(255,255,255,.45);
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }

  /* ─────────── Modal ─────────── */
  .modal-back {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,34,64,.55);
    backdrop-filter: blur(8px);
    display: grid;
    place-items: center;
    padding: 24px;
    animation: fade .2s ease;
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--white);
    border-radius: 20px;
    width: min(100%, 520px);
    padding: 32px;
    box-shadow: var(--shadow-lg);
    animation: pop .25s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .x {
    float: right;
    width: 34px; height: 34px;
    border-radius: 999px;
    background: var(--paper-2);
    display: grid;
    place-items: center;
    transition: background .15s ease;
  }
  .modal .x:hover { background: var(--line); }
  .modal h3 {
    margin: 4px 0 8px;
    font-family: var(--serif);
    font-weight: 500;
    font-size: 26px;
    letter-spacing: -0.015em;
    color: var(--navy-900);
  }
  .modal p {
    margin: 0 0 20px;
    color: var(--ink-2);
    font-size: 14.5px;
  }
  .summary {
    margin: 8px 0 22px;
    padding: 16px 18px;
    border-radius: 14px;
    background: var(--paper-2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .summary .lbl {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .summary .amt {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 26px;
    color: var(--navy-900);
    letter-spacing: -0.015em;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    color: var(--ink-2);
    margin-bottom: 6px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .field input {
    width: 100%;
    padding: 13px 14px;
    border: 1px solid var(--line);
    border-radius: 12px;
    font: inherit;
    font-weight: 500;
    color: var(--ink);
    background: var(--paper);
    outline: 0;
    transition: border-color .15s ease;
  }
  .field input:focus { border-color: var(--navy-700); background: var(--white); }
  .modal-fine {
    margin: 16px 0 0;
    text-align: center;
    font-size: 12px;
    color: var(--ink-3);
  }

  /* ─────────── Toast ─────────── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    padding: 13px 22px 13px 24px;
    border-radius: 999px;
    font-weight: 500;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 18px;
    z-index: 200;
    box-shadow: var(--shadow-lg);
  }
  .toast-success { background: var(--navy-900); color: var(--white); }
  .toast-error   { background: #c44; color: var(--white); }
  .toast-info    { background: var(--navy-900); color: var(--white); }
  .toast button  { color: rgba(255,255,255,.5); font-size: 16px; line-height: 1; }

  /* ─────────── Hidden utility ─────────── */
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app"></div>
<div id="__err" style="display:none;position:fixed;top:0;left:0;right:0;background:#c44;color:white;padding:14px;font:13px/1.4 monospace;white-space:pre-wrap;z-index:9999;max-height:50vh;overflow:auto"></div>

<script>
  window.addEventListener('error', function(e) {
    var el = document.getElementById('__err');
    el.style.display = 'block';
    el.textContent = 'ERROR: ' + (e.message || e.error) + '\nFile: ' + (e.filename || '?') + ':' + (e.lineno || '?');
  });
  window.addEventListener('unhandledrejection', function(e) {
    var el = document.getElementById('__err');
    el.style.display = 'block';
    el.textContent = 'PROMISE REJECTION: ' + (e.reason && (e.reason.message || e.reason));
  });

  window.GATEWAY_CONFIG = {
    provider: "ozow",
    siteCode: "YOUR_OZOW_SITE_CODE",
    privateKey: "YOUR_OZOW_PRIVATE_KEY",
    countryCode: "ZA",
    currencyCode: "ZAR",
    isTest: true,
    successUrl: window.location.origin + "/?payment=success",
    errorUrl: window.location.origin + "/?payment=error",
    cancelUrl: window.location.origin + "/?payment=cancelled",
  };
</script>

<script src="https://unpkg.com/qrious@4.0.2/dist/qrious.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
